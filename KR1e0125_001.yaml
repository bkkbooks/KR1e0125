body:
  text: 續春秋左氏傳義略隱公十有一年夏公會鄭伯于時來來力之反陸德明釋文文公十有三年繞朝贈之以策杜注策馬撾鄒華反同上昭公六年士匄相士鞅逆諸河禮也今傳本皆作士匄相士鞅古本士匄或作王正董遇王肅本同學者皆以士匄是范宣子即范鞅之父不應取其父同姓名人以為介今傳本誤也依王正為是以上據釋文補古人質口不言之耳何妨為介也案士文伯是士鞅之族亦名匄無妨今相范鞅即文伯也釋文引王元規又襄三十一年釋文云匄本或作丐古害反士文伯名也今傳本多作匄字字或作丐字釋例亦然解者云士伯是范氏之族不應與范宣子同名作丏是也
